<!DOCTYPE html>
<html lang="tr" style="background:#F9FAFB;color:#111827;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pazar — Haldeki fiyatı, markete gitmeden bil</title>
  <style>
    :root {
      --primary:        #0F5132;
      --primary-dark:   #0a3d25;
      --primary-mid:    #1a7a4e;
      --primary-light:  #ECFDF5;
      --primary-text:   #065F46;
      --border:         #E5E7EB;
      --border-green:   #D1FAE5;
      --bg:             #F9FAFB;
      --card:           #FFFFFF;
      --gray-100:       #F3F4F6;
      --gray-300:       #D1D5DB;
      --gray-400:       #9CA3AF;
      --gray-500:       #6B7280;
      --gray-700:       #374151;
      --gray-900:       #111827;
      --radius-card:    16px;
      --shadow-card:    0 2px 12px rgba(0,0,0,.06);
      --shadow-hover:   0 6px 24px rgba(0,0,0,.10);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html { scroll-behavior: smooth; background: #F9FAFB; color: #111827; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9FAFB !important;
      color: #111827 !important;
      max-width: 600px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0F5132 !important;
      padding: 20px 16px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,.12);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 13px;
      flex: 1;
      min-width: 0;
    }

    .header-logo {
      width: 44px;
      height: 44px;
      background: #1a6840;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,.25);
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    .header-logo span {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: #fff;
      line-height: 1;
      letter-spacing: -.5px;
    }

    .header-text { min-width: 0; }

    .header-text h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: #fff;
      letter-spacing: -.4px;
      line-height: 1;
    }

    .header-text p {
      font-size: .71rem;
      font-style: italic;
      color: rgba(255,255,255,.68);
      margin-top: 4px;
      font-weight: 400;
      letter-spacing: .01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .header-btn {
      width: 38px;
      height: 38px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background .15s;
    }
    .header-btn:hover { background: rgba(255,255,255,.2); }
    .header-btn svg { width: 16px; height: 16px; stroke: rgba(255,255,255,.9); fill: none; stroke-width: 2; }

    .bell-dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 8px;
      height: 8px;
      background: #FCD34D;
      border-radius: 50%;
      border: 1.5px solid var(--primary);
    }

    /* ─── SEARCH BAR ─── */
    .search-wrap {
      background: var(--card);
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .search-inner { display: flex; align-items: center; gap: 8px; }

    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 9px;
      background: #fff;
      border: 1.5px solid var(--border-green);
      border-radius: 11px;
      padding: 10px 13px;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-box:focus-within {
      border-color: var(--primary-mid);
      box-shadow: 0 0 0 3px rgba(15,81,50,.1);
    }
    .search-box svg { width: 15px; height: 15px; stroke: var(--gray-400); fill: none; stroke-width: 2; flex-shrink: 0; }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: .88rem;
      color: var(--gray-900);
    }
    .search-box input::placeholder { color: var(--gray-400); }

    .barcode-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .barcode-btn:hover { background: var(--primary-light); border-color: var(--border-green); }
    .barcode-btn svg { width: 18px; height: 18px; stroke: var(--gray-500); fill: none; stroke-width: 1.5; }

    /* ─── CATEGORIES ─── */
    .cat-wrap {
      background: var(--card);
      padding: 10px 14px 12px;
      border-bottom: 1px solid var(--border);
    }

    .cat-scroll {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }

    .cat-pill {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 999px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--gray-500);
      transition: all .15s;
      white-space: nowrap;
      line-height: 1.5;
    }
    .cat-pill:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .cat-pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(15,81,50,.3);
    }

    /* ─── STATS ROW ─── */
    .stats-row {
      padding: 9px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .73rem;
      color: var(--gray-400);
    }
    .stats-row b { color: var(--gray-700); font-weight: 700; }
    .hal-date-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .68rem;
      font-weight: 600;
      color: var(--primary-text);
      background: var(--primary-light);
      border: 1px solid var(--border-green);
      border-radius: 6px;
      padding: 3px 9px;
    }
    .hal-date-badge::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
    }

    /* ─── PRODUCT LIST ─── */
    .product-list {
      padding: 6px 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ─── CARD ─── */
    .card {
      background: white !important;
      border-radius: var(--radius-card);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06) !important;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.05);
      transition: box-shadow .2s, transform .15s;
    }
    .card:active { transform: scale(.994); box-shadow: var(--shadow-card); }

    .card-main {
      display: flex;
      gap: 13px;
      padding: 14px 14px 12px;
    }

    .card-img {
      width: 78px;
      height: 78px;
      flex-shrink: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, #F9FAFB, #F3F4F6);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
    }
    .card-img img { width: 100%; height: 100%; object-fit: contain; }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-size: .9rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--gray-900);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-unit {
      display: inline-block;
      margin-top: 4px;
      font-size: .66rem;
      font-weight: 600;
      color: var(--gray-500);
      background: var(--gray-100);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 7px;
      letter-spacing: .01em;
    }

    .hal-block { margin-top: 10px; }

    .hal-label {
      font-size: .6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--gray-500);
    }

    .hal-price-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-top: 1px;
    }

    .hal-price {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1;
      letter-spacing: -.5px;

    .hal-unit-text {
      font-size: .7rem;
      color: var(--gray-400);
      font-weight: 500;
    }

    .hal-none {
      font-size: .75rem;
      color: var(--gray-400);
      margin-top: 10px;
      font-style: italic;
    }

    /* ─── MARKET SECTION ─── */
    .market-section {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
    }

    .market-section-label {
      font-size: .6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--gray-400);
      margin-bottom: 8px;
    }

    .market-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 5px 0;
      border-top: 1px solid #F3F4F6;
    }
    .market-row:first-of-type { border-top: none; }

    .m-tag {
      font-size: .58rem;
      font-weight: 700;
      color: #fff;
      padding: 3px 8px;
      border-radius: 5px;
      min-width: 52px;
      text-align: center;
      flex-shrink: 0;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .m-a101        { background: #DC2626; }
    .m-bim         { background: #991B1B; }
    .m-carrefour   { background: #1D4ED8; }
    .m-migros      { background: #E53E3E; }
    .m-sok         { background: #D97706; }
    .m-tarim_kredi { background: #15803D; }
    .m-default     { background: #6B7280; }

    .m-store {
      font-size: .74rem;
      color: var(--gray-500);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .m-price {
      font-size: .83rem;
      font-weight: 700;
      color: var(--gray-700);
      flex-shrink: 0;
      letter-spacing: -.2px;
    }
    .m-price.best { color: var(--primary); }

    /* ─── SAVINGS BAR ─── */
    .savings-bar {
      padding: 10px 14px;
      font-size: .77rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
    }

    .savings-bar.cheaper {
      background: var(--primary-light);
      color: var(--primary-text);
    }
    .savings-bar.pricier {
      background: #FEF2F2;
      color: #991B1B;
    }
    .savings-bar.equal {
      background: var(--gray-100);
      color: var(--gray-500);
    }

    .savings-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      font-weight: 800;
    }
    .cheaper .savings-icon { background: var(--primary-text); color: #fff; }
    .pricier .savings-icon { background: #991B1B; color: #fff; }
    .equal   .savings-icon { background: var(--gray-400); color: #fff; }

    /* ─── EMPTY / LOADING STATES ─── */
    .state-msg {
      text-align: center;
      padding: 60px 24px;
      color: var(--gray-400);
      font-size: .9rem;
      line-height: 1.6;
    }

    .state-msg .state-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 12px;
      opacity: .5;
    }

    .loading-card {
      background: var(--card);
      border-radius: var(--radius-card);
      padding: 16px;
      border: 1px solid rgba(0,0,0,.05);
      display: flex;
      gap: 13px;
    }
    .skel {
      background: linear-gradient(90deg, #F3F4F6 25%, #E9EAED 50%, #F3F4F6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    .skel-img  { width: 78px; height: 78px; flex-shrink: 0; border-radius: 10px; }
    .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
    .skel-line  { height: 10px; }
    .skel-line.w70 { width: 70%; }
    .skel-line.w40 { width: 40%; }
    .skel-line.w55 { width: 55%; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      background: var(--card);
      box-shadow: 0 -1px 0 var(--border), 0 -6px 20px rgba(0,0,0,.06);
      display: flex;
      z-index: 200;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px 14px;
      gap: 3px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: .6rem;
      font-weight: 600;
      color: var(--gray-400);
      background: none;
      border: none;
      cursor: pointer;
      transition: color .15s;
      letter-spacing: .02em;
    }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn.active svg { stroke: var(--primary); }
  </style>
</head>

<script>
const MARKET_AD = {
  a101: 'A101', bim: 'BİM', carrefour: 'CarrefourSA',
  migros: 'Migros', sok: 'ŞOK', tarim_kredi: 'T.Kredi'
};

let tumUrunler = [], halMap = {}, aktifKat = 'tumu';

function norm(s) {
  return (s || '').toLowerCase()
    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9 ]/g,'').trim();
}

function halEsles(u) {
  const mW = norm(u.ad).split(/\s+/).filter(w => w.length > 2);
  let best = null, bestScore = 0;
  for (const [key, rec] of Object.entries(halMap)) {
    const hW = key.split(/\s+/).filter(w => w.length > 2);
    if (!hW.length || !mW.length) continue;
    const score = hW.filter(w => mW.includes(w)).length / Math.max(hW.length, mW.length);
    if (score > bestScore) { bestScore = score; best = rec; }
  }
  return bestScore >= 0.5 ? best : null;
}

function kategori(u) {
  const ana  = norm(u.ana_kategori || '');
  const cats = (u.kategoriler || []).map(c => norm(c));

  if (ana.includes('et') && (ana.includes('tavuk') || ana.includes('balik'))) return 'et';
  if (ana.includes('sut'))                                                      return 'sut';
  if (ana.includes('temel') && ana.includes('gida'))                           return 'gida';
  if (ana.includes('icecek'))                                                   return 'icecek';
  if (ana.includes('temizlik'))                                                 return 'temizlik';

  // "Meyve ve Sebze" birleşik kategorisi: sub-kategori varsa kullan, yoksa sebze
  if (ana === 'meyve ve sebze' || ana === 'sebze') {
    if (cats.some(c => c === 'meyve')) return 'meyve';
    return 'sebze';
  }
  if (ana === 'meyve') return 'meyve';

  // Yedek: kategoriler dizisine bak
  if (cats.some(c => c === 'meyve'))  return 'meyve';
  if (cats.some(c => c === 'sebze'))  return 'sebze';
  if (cats.some(c => c.includes('meyve'))) return 'meyve';
  if (cats.some(c => c.includes('sebze'))) return 'sebze';

  return 'diger';
}

function tl(v) {
  if (v == null) return '—';
  return v.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₺';
}

Promise.allSettled([
  fetch('/api/urunler').then(r => r.json()),
  fetch('/api/hal').then(r => r.json()),
]).then(([uR, hR]) => {
  if (uR.status === 'fulfilled' && uR.value.urunler) {
    tumUrunler = uR.value.urunler;
  }
  if (hR.status === 'fulfilled' && hR.value.urunler) {
    hR.value.urunler.forEach(u => {
      const k = norm(u.ad);
      if (!halMap[k] || (u.fiyat != null && u.fiyat < (halMap[k].fiyat ?? 9999)))
        halMap[k] = u;
    });
    const bt = hR.value.bulten_tarihi || '';
    if (bt) {
      document.getElementById('halDate').innerHTML =
        `<span class="hal-date-badge">Hal verisi: ${bt.slice(0,10)}</span>`;
    }
  }
  render();
});

const ONCELIKLI = [
  'yumurta','sut','ekmek','domates','salatalik','patates','sogan',
  'elma','muz','portakal','limon','yogurt','peynir','tereyagi'
];

function minFiyat(u) {
  const prices = (u.fiyatlar || []).map(f => f.fiyat).filter(p => p != null);
  return prices.length ? Math.min(...prices) : (u.en_dusuk_fiyat ?? Infinity);
}

function getList() {
  const q = norm(document.getElementById('search').value);
  const filtered = tumUrunler
    .filter(u => {
      const hal      = halEsles(u);
      const marketler = (u.fiyatlar || []).filter(f => f.fiyat != null);
      const hasHal    = hal?.fiyat != null;
      const hasMarket = marketler.length > 0;
      if (!hasHal && !hasMarket) return false;
      if (hasHal && hasMarket) {
        const minMarket = Math.min(...marketler.map(f => f.fiyat));
        if (minMarket / hal.fiyat > 5) return false;
      }
      return true;
    })
    .filter(u => aktifKat === 'tumu' || kategori(u) === aktifKat)
    .filter(u => !q || norm(u.ad).includes(q) || norm(u.marka || '').includes(q));

  // Her öncelikli keyword için en ucuz 1 ürünü öne al
  const champIds = new Set();
  const champions = [];
  for (const keyword of ONCELIKLI) {
    const eslesen = filtered.filter(u => norm(u.ad).includes(keyword));
    if (!eslesen.length) continue;
    const ucuzu = eslesen.reduce((en, u) => minFiyat(u) < minFiyat(en) ? u : en);
    if (!champIds.has(ucuzu.id)) {
      champIds.add(ucuzu.id);
      champions.push(ucuzu);
    }
  }

  // Geri kalanlar: şampiyon olmayanlar orijinal sırayla
  const rest = filtered.filter(u => !champIds.has(u.id));
  return [...champions, ...rest];
}

function cardHTML(u) {
  const hal      = halEsles(u);
  const halFiyat = hal?.fiyat ?? null;
  const marketler = (u.fiyatlar || []).filter(f => f.fiyat != null).sort((a, b) => a.fiyat - b.fiyat);
  const minMarket = marketler[0]?.fiyat ?? null;

  const imgInner = u.resim
    ? `<img src="${u.resim}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '🛒';

  const halBlock = halFiyat != null
    ? `<div class="hal-block">
        <div class="hal-label">Hal Fiyatı</div>
        <div class="hal-price-row">
          <span class="hal-price">${tl(halFiyat)}</span>
          <span class="hal-unit-text">/ ${hal.birim || 'Kg'}</span>
        </div>
       </div>`
    : `<p class="hal-none">Hal verisi bulunamadı</p>`;

  const marketRows = marketler.slice(0, 4).map((f, i) => `
    <div class="market-row">
      <span class="m-tag m-${f.market || 'default'}">${MARKET_AD[f.market] || f.market || '?'}</span>
      <span class="m-store">${f.depo_adi || ''}</span>
      <span class="m-price${i === 0 ? ' best' : ''}">${tl(f.fiyat)}</span>
    </div>`).join('');

  let savingsBar = '';
  if (halFiyat != null && minMarket != null) {
    const diff = minMarket - halFiyat;
    if (diff > 0.01) {
      savingsBar = `<div class="savings-bar cheaper">
        <span class="savings-icon">✓</span>
        Halde <strong>${tl(diff)} daha ucuz</strong>&nbsp;· En ucuz market: ${tl(minMarket)}
      </div>`;
    } else if (diff < -0.01) {
      savingsBar = `<div class="savings-bar pricier">
        <span class="savings-icon">↓</span>
        Market <strong>${tl(-diff)} daha ucuz</strong>&nbsp;· Hal fiyatı: ${tl(halFiyat)}
      </div>`;
    } else {
      savingsBar = `<div class="savings-bar equal">
        <span class="savings-icon">≈</span>
        Hal ve market fiyatı birbirine yakın
      </div>`;
    }
  }

  return `<div class="card" data-category="${kategori(u)}">
    <div class="card-main">
      <div class="card-img">${imgInner}</div>
      <div class="card-info">
        <div class="card-name">${u.ad}</div>
        ${u.agirlik_hacim ? `<span class="card-unit">${u.agirlik_hacim}</span>` : ''}
        ${halBlock}
      </div>
    </div>
    <div class="market-section">
      <div class="market-section-label">Market Fiyatları</div>
      ${marketRows || '<p class="hal-none">Market verisi yok</p>'}
    </div>
    ${savingsBar}
  </div>`;
}

function render() {
  const list = getList();
  document.getElementById('countNum').textContent = list.length;
  document.getElementById('productList').innerHTML = list.length
    ? list.map(cardHTML).join('')
    : `<div class="state-msg">
        <span class="state-icon">🔍</span>
        Aradığınız ürün bulunamadı.<br>Farklı bir kelime deneyin.
       </div>`;
}

document.getElementById('search').addEventListener('input', render);

document.getElementById('catScroll').addEventListener('click', e => {
  const pill = e.target.closest('.cat-pill');
  if (!pill) return;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  aktifKat = pill.dataset.cat;
  render();
});

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>
</body>
</html>
