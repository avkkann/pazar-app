<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Pazar — Haldeki fiyatı, markete gitmeden bil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9FAFB; color: #111827;
      -webkit-font-smoothing: antialiased;
    }

    /* ── EKRANLAR ── */
    .screen {
      display: none;
      min-height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
      background: #F9FAFB;
      padding-bottom: 72px;
    }
    #screen-home { display: block; }

    /* ── HEADER ── */
    .header {
      background: #0F5132;
      padding: 20px 16px 16px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-logo {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      font-family: Georgia, serif; font-size: 1.3rem; font-weight: 900; color: #fff;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: Georgia, serif; font-size: 1.45rem; font-weight: 800;
      color: #fff; line-height: 1;
    }
    .header-text p { font-size: .68rem; color: rgba(255,255,255,.7); margin-top: 3px; font-style: italic; }

    .header-sub {
      background: #0F5132;
      padding: 13px 16px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-sub h2 {
      font-family: Georgia, serif; font-size: 1.15rem; font-weight: 800; color: #fff;
    }
    .back-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      background: rgba(255,255,255,.15); border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .back-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; }

    /* ── ARAMA ── */
    .search-wrap { background: #fff; padding: 11px 14px; border-bottom: 1px solid #E5E7EB; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: #F9FAFB; border: 1.5px solid #D1FAE5; border-radius: 10px; padding: 10px 12px;
    }
    .search-box:focus-within { border-color: #1a7a4e; }
    .search-box svg { width: 15px; height: 15px; stroke: #9CA3AF; fill: none; stroke-width: 2; flex-shrink: 0; }
    .search-box input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: .875rem; color: #111827;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .search-box input::placeholder { color: #9CA3AF; }

    /* ── KATEGORİ GRİD ── */
    .cat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 16px 14px;
    }
    .cat-card {
      background: #fff; border: 1px solid #E5E7EB; border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      padding: 22px 12px 18px;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      cursor: pointer; transition: transform .15s; user-select: none;
    }
    .cat-card:active { transform: scale(.95); }
    .cat-card-emoji { font-size: 2.5rem; line-height: 1; }
    .cat-card-name { font-size: .84rem; font-weight: 700; color: #111827; text-align: center; line-height: 1.35; }
    .cat-card-count { font-size: .68rem; color: #9CA3AF; }

    /* ── STATS ── */
    .stats-row {
      padding: 8px 16px; font-size: .72rem; color: #9CA3AF;
      display: flex; justify-content: space-between; align-items: center;
    }
    .stats-row b { color: #374151; }
    .hal-badge {
      font-size: .66rem; font-weight: 600; color: #065F46;
      background: #ECFDF5; border: 1px solid #D1FAE5; border-radius: 6px; padding: 3px 8px;
    }

    /* ── ÜRÜN LİSTESİ ── */
    .product-list { padding: 6px 14px 20px; display: flex; flex-direction: column; gap: 10px; }

    /* ── KART ── */
    .card {
      background: #fff; border-radius: 14px;
      border: 1px solid rgba(0,0,0,.06); box-shadow: 0 2px 8px rgba(0,0,0,.05); overflow: hidden;
    }
    .card-main { display: flex; gap: 12px; padding: 13px 13px 11px; }
    .card-img {
      width: 72px; height: 72px; flex-shrink: 0; border-radius: 10px;
      background: #F3F4F6; border: 1px solid #E5E7EB;
      display: flex; align-items: center; justify-content: center; font-size: 1.8rem; overflow: hidden;
    }
    .card-img img { width: 100%; height: 100%; object-fit: contain; }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: .88rem; font-weight: 700; color: #111827; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-unit {
      display: inline-block; margin-top: 4px;
      font-size: .63rem; font-weight: 600; color: #6B7280;
      background: #F3F4F6; border: 1px solid #E5E7EB; border-radius: 4px; padding: 2px 6px;
    }
    .hal-block { margin-top: 8px; }
    .hal-label { font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #6B7280; }
    .hal-price { font-size: 1.25rem; font-weight: 800; color: #111827; line-height: 1; letter-spacing: -.5px; }
    .hal-unit-text { font-size: .68rem; color: #9CA3AF; margin-left: 3px; }
    .hal-none { font-size: .73rem; color: #9CA3AF; margin-top: 8px; font-style: italic; }

    /* ── MARKET BÖLÜMÜ ── */
    .market-section { border-top: 1px solid #F3F4F6; padding: 9px 13px; }
    .market-section-label {
      font-size: .58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #9CA3AF; margin-bottom: 7px;
    }
    .market-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-top: 1px solid #F9FAFB; }
    .market-row:first-child { border-top: none; }
    .m-tag {
      font-size: .56rem; font-weight: 700; color: #fff; padding: 3px 7px;
      border-radius: 4px; min-width: 48px; text-align: center; flex-shrink: 0;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .m-a101 { background: #DC2626; } .m-bim { background: #991B1B; }
    .m-carrefour { background: #1D4ED8; } .m-migros { background: #E53E3E; }
    .m-sok { background: #D97706; } .m-tarim_kredi { background: #15803D; }
    .m-default { background: #6B7280; }
    .m-store {
      font-size: .72rem; color: #6B7280; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-price { font-size: .8rem; font-weight: 700; color: #374151; flex-shrink: 0; }
    .m-price.best { color: #0F5132; }

    /* ── TASARRUF BARI ── */
    .savings-bar {
      padding: 9px 13px; font-size: .74rem; font-weight: 600;
      display: flex; align-items: center; gap: 7px; border-top: 1px solid #E5E7EB;
    }
    .savings-bar.cheaper { background: #ECFDF5; color: #065F46; }
    .savings-bar.pricier { background: #FEF2F2; color: #991B1B; }
    .savings-bar.equal   { background: #F3F4F6; color: #6B7280; }

    /* ── SEPETE EKLE ── */
    .card-footer { display: flex; justify-content: flex-end; padding: 0 13px 11px; }
    .btn-ekle {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; background: #0F5132; color: #fff;
      border: none; border-radius: 7px;
      font-size: .72rem; font-weight: 700; cursor: pointer;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .btn-ekle:active { background: #1a7a4e; }
    .btn-ekle.added { background: #9CA3AF; }
    .btn-ekle svg { width: 11px; height: 11px; stroke: #fff; fill: none; stroke-width: 2.5; }

    /* ── SEPET ── */
    .cart-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 9px; }
    .cart-item {
      background: #fff; border-radius: 12px; border: 1px solid #E5E7EB;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      display: flex; align-items: center; gap: 11px; padding: 11px 13px;
    }
    .cart-item-img {
      width: 44px; height: 44px; flex-shrink: 0; border-radius: 8px;
      background: #F3F4F6; border: 1px solid #E5E7EB;
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem; overflow: hidden;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: contain; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name {
      font-size: .83rem; font-weight: 700; color: #111827; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cart-item-sub { font-size: .67rem; color: #9CA3AF; margin-top: 2px; }
    .cart-del {
      width: 28px; height: 28px; flex-shrink: 0;
      background: #FEF2F2; border: 1px solid #FECACA; border-radius: 7px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .cart-del svg { width: 13px; height: 13px; stroke: #DC2626; fill: none; stroke-width: 2; }
    .btn-compare {
      display: block; margin: 6px 14px 4px; width: calc(100% - 28px);
      padding: 13px; background: #0F5132; color: #fff;
      border: none; border-radius: 12px;
      font-size: .88rem; font-weight: 700; cursor: pointer; text-align: center;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .btn-compare:hover { background: #1a7a4e; }

    /* ── KARŞILAŞTIRMA ── */
    .compare-wrap { padding: 12px 14px 20px; }
    .compare-title {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #9CA3AF; margin-bottom: 10px;
    }
    .compare-savings {
      background: #ECFDF5; border: 1px solid #D1FAE5; border-radius: 10px;
      padding: 10px 13px; margin-bottom: 10px;
      font-size: .8rem; color: #065F46; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .compare-row {
      background: #fff; border-radius: 12px; border: 1px solid #E5E7EB;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      display: flex; align-items: center; gap: 11px;
      padding: 11px 13px; margin-bottom: 8px;
    }
    .compare-row.best { background: #ECFDF5; border-color: #D1FAE5; }
    .compare-rank {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      background: #F3F4F6; color: #6B7280;
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 800;
    }
    .compare-row.best .compare-rank { background: #0F5132; color: #fff; }
    .compare-info { flex: 1; min-width: 0; }
    .compare-mname { font-size: .83rem; font-weight: 700; color: #111827; }
    .compare-row.best .compare-mname { color: #065F46; }
    .compare-detail { font-size: .67rem; color: #9CA3AF; margin-top: 2px; }
    .compare-total { font-size: .95rem; font-weight: 800; color: #111827; flex-shrink: 0; }
    .compare-row.best .compare-total { color: #065F46; }

    /* ── BOŞLUK / MESAJ ── */
    .state-msg { text-align: center; padding: 50px 24px; color: #9CA3AF; font-size: .88rem; line-height: 1.6; }
    .state-msg .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    /* ── ALT NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 600px;
      background: #fff; border-top: 1px solid #E5E7EB;
      box-shadow: 0 -4px 16px rgba(0,0,0,.06);
      display: flex; z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 8px 4px 13px; gap: 3px;
      background: none; border: none; cursor: pointer;
      font-size: .58rem; font-weight: 600; color: #9CA3AF; letter-spacing: .02em;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: color .15s;
    }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nav-btn.active { color: #0F5132; }
  </style>
</head>
<body>

<!-- ══ EKRAN 1: ANA SAYFA ══ -->
<div id="screen-home" class="screen">

  <header class="header">
    <div class="header-logo">P</div>
    <div class="header-text">
      <h1>Pazar</h1>
      <p>Haldeki fiyatı, markete gitmeden bil</p>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Tüm kategorilerde ara… örn. domates" autocomplete="off">
    </div>
  </div>

  <div id="home-cats" class="cat-grid"></div>

  <div id="home-search" style="display:none">
    <div class="stats-row"><span><b id="searchCount">0</b> sonuç</span></div>
    <div class="product-list" id="searchList"></div>
  </div>

</div>

<!-- ══ EKRAN 2: KATEGORİ ══ -->
<div id="screen-cat" class="screen">

  <header class="header-sub">
    <button class="back-btn" onclick="showScreen('screen-home')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 id="cat-title">Kategori</h2>
  </header>

  <div class="stats-row">
    <span><b id="countNum">—</b> ürün listeleniyor</span>
    <span id="halDate"></span>
  </div>

  <div class="product-list" id="productList"></div>

</div>

<!-- ══ EKRAN 3: SEPET ══ -->
<div id="screen-sepet" class="screen">

  <header class="header-sub">
    <button class="back-btn" onclick="showScreen('screen-home')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2>Sepetim (<span id="sepetCount">0</span>)</h2>
  </header>

  <div id="sepetContent">
    <div class="state-msg"><span class="icon">🛒</span>Sepetiniz boş.<br>Ürün kartlarındaki + butonuna basın.</div>
  </div>

</div>

<!-- ALT NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navHome" onclick="showScreen('screen-home')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Ana Sayfa
  </button>
  <button class="nav-btn" id="navSepet" onclick="goSepet()">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.97-1.67L23 6H6"/></svg>
    Sepetim
  </button>
  <button class="nav-btn" onclick="alert('Yakında!')">
    <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    Fırsatlar
  </button>
  <button class="nav-btn" onclick="alert('Yakında!')">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profil
  </button>
</nav>

<script>
// ── SABİTLER ──────────────────────────────────────────
const MARKET_NAMES = {
  a101:'A101', bim:'BİM', carrefour:'CarrefourSA',
  migros:'Migros', sok:'ŞOK', tarim_kredi:'T.Kredi'
};
const KAT_EMOJI = {
  meyve:'🍎', sebze:'🥦', et:'🥩', sut:'🧀',
  gida:'🛒', icecek:'🥤', temizlik:'🧴', diger:'📦'
};
const KATEGORILER = [
  { slug:'meyve-sebze', label:'Meyve & Sebze', emoji:'🍎', cats:['meyve','sebze'] },
  { slug:'et',          label:'Et & Tavuk',    emoji:'🥩', cats:['et'] },
  { slug:'sut',         label:'Süt & Kahvaltı',emoji:'🧀', cats:['sut'] },
  { slug:'gida',        label:'Temel Gıda',    emoji:'🛒', cats:['gida'] },
  { slug:'icecek',      label:'İçecek',        emoji:'🥤', cats:['icecek'] },
  { slug:'temizlik',    label:'Temizlik',       emoji:'🧴', cats:['temizlik'] },
];
const ONCELIKLI = [
  'yumurta','sut','ekmek','domates','salatalik',
  'patates','sogan','elma','muz','portakal',
  'limon','yogurt','peynir','tereyagi'
];

// ── DURUM ─────────────────────────────────────────────
let urunler = [], halMap = {};
let sepet   = JSON.parse(localStorage.getItem('pazar_sepet') || '[]');

// ── NAVİGASYON ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (id === 'screen-home')  document.getElementById('navHome').classList.add('active');
  if (id === 'screen-sepet') document.getElementById('navSepet').classList.add('active');
}

function goSepet() {
  renderSepet();
  showScreen('screen-sepet');
}

// ── YARDIMCILAR ───────────────────────────────────────
function norm(s) {
  return (s||'').toLowerCase()
    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9 ]/g,'').trim();
}

function tl(v) {
  return v == null ? '—' :
    v.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' ₺';
}

function ustKategori(k) {
  k = k || '';
  if (['Meyve'].includes(k)) return 'meyve';
  if (['Sebze'].includes(k)) return 'sebze';
  if (['Şarküteri','Beyaz Et','Kırmızı Et','Deniz Ürünleri','Sakatat'].includes(k)) return 'et';
  if (['Süt','Yoğurt','Peynir','Tereyağı ve Margarin','Kaymak ve Krema','Yumurta',
       'Zeytin','Bal ve Reçel','Helva Tahin ve Pekmez','Kahvaltılık Gevrek Bar ve Granola',
       'Sürülebilir Ürünler ve Kahvaltılık Soslar','Ayran ve Kefir'].includes(k)) return 'sut';
  if (['Mantı Makarna ve Erişte','Pasta Malzemeleri','Hazır Gıda','Bakliyat',
       'Ekmek ve Unlu Mamüller','Konserve','Salça','Ketçap Mayonez Sos ve Sirkeler',
       'Sıvı Yağlar','Tuz Baharat ve Harçlar','Şeker ve Tatlandırıcılar',
       'Turşu','Un ve İrmik','Bebek Mamaları'].includes(k)) return 'gida';
  if (['Meyve Suyu','Su','Maden Suyu','Çay ve Bitki Çayları',
       'Gazsız İçecekler','Gazlı İçecekler','Kahve'].includes(k)) return 'icecek';
  if (['Bulaşık Temizlik Ürünleri','Kağıt Havlu','Kağıt Peçete ve Mendil',
       'Genel Temizlik Ürünleri','Hijyenik Ped','Çamaşır Temizlik Ürünleri',
       'Saç Bakım','Cilt Bakımı','Parfüm Deodorant Kolonya ve Kokular',
       'Mutfak Sarf Malzemeleri'].includes(k)) return 'temizlik';
  return 'diger';
}

function halEsles(u) {
  const mW = norm(u.ad).split(/\s+/).filter(w => w.length > 2);
  let best = null, bestSc = 0;
  for (const [key, rec] of Object.entries(halMap)) {
    const hW = key.split(/\s+/).filter(w => w.length > 2);
    if (!hW.length || !mW.length) continue;
    const sc = hW.filter(w => mW.includes(w)).length / Math.max(hW.length, mW.length);
    if (sc > bestSc) { bestSc = sc; best = rec; }
  }
  return bestSc >= 0.5 ? best : null;
}

function minFiyat(u) {
  const ps = (u.fiyatlar||[]).map(f => f.fiyat).filter(p => p != null);
  return ps.length ? Math.min(...ps) : (u.en_dusuk_fiyat ?? Infinity);
}

// ── ÜRÜN LİSTESİ ──────────────────────────────────────
function getList(cats, q) {
  const qn = norm(q || '');
  let list = urunler.filter(u => {
    const hal = halEsles(u);
    const mkt = (u.fiyatlar||[]).filter(f => f.fiyat != null);
    if (!hal?.fiyat && !mkt.length) return false;
    if (hal?.fiyat && mkt.length) {
      const mn = Math.min(...mkt.map(f => f.fiyat));
      if (mn / hal.fiyat > 5) return false;
    }
    return true;
  });
  if (cats) list = list.filter(u => cats.includes(ustKategori(u.ana_kategori)));
  if (qn)   list = list.filter(u => norm(u.ad).includes(qn) || norm(u.marka||'').includes(qn));

  const used = new Set(), champions = [];
  for (const kw of ONCELIKLI) {
    const match = list.filter(u => norm(u.ad).includes(kw));
    if (!match.length) continue;
    const best = match.reduce((a,b) => minFiyat(a) <= minFiyat(b) ? a : b);
    if (!used.has(best.id)) { used.add(best.id); champions.push(best); }
  }
  return [...champions, ...list.filter(u => !used.has(u.id))];
}

// ── KART HTML ─────────────────────────────────────────
function cardHTML(u) {
  const hal      = halEsles(u);
  const halFiyat = hal?.fiyat ?? null;
  const mktler   = (u.fiyatlar||[]).filter(f => f.fiyat != null).sort((a,b) => a.fiyat - b.fiyat);
  const minMkt   = mktler[0]?.fiyat ?? null;
  const emoji    = KAT_EMOJI[ustKategori(u.ana_kategori)] || '📦';
  const img      = u.resim
    ? `<img src="${u.resim}" alt="" loading="lazy" onerror="this.outerHTML='${emoji}'">`
    : emoji;

  const halBlock = halFiyat != null
    ? `<div class="hal-block">
        <div class="hal-label">Hal Fiyatı</div>
        <div><span class="hal-price">${tl(halFiyat)}</span><span class="hal-unit-text">/ ${hal.birim||'Kg'}</span></div>
       </div>`
    : `<p class="hal-none">Hal verisi yok</p>`;

  const mktRows = mktler.slice(0,4).map((f,i) =>
    `<div class="market-row">
      <span class="m-tag m-${f.market||'default'}">${MARKET_NAMES[f.market]||f.market||'?'}</span>
      <span class="m-store">${f.depo_adi||''}</span>
      <span class="m-price${i===0?' best':''}">${tl(f.fiyat)}</span>
    </div>`).join('');

  let savings = '';
  if (halFiyat != null && minMkt != null) {
    const d = minMkt - halFiyat;
    if      (d >  0.01) savings = `<div class="savings-bar cheaper">✓ Halde <b>${tl(d)} daha ucuz</b> · Market: ${tl(minMkt)}</div>`;
    else if (d < -0.01) savings = `<div class="savings-bar pricier">↓ Market <b>${tl(-d)} daha ucuz</b> · Hal: ${tl(halFiyat)}</div>`;
    else                savings = `<div class="savings-bar equal">≈ Fiyatlar birbirine yakın</div>`;
  }

  const inCart = sepet.some(s => s.id === u.id);
  const ekle   = `<div class="card-footer">
    <button class="btn-ekle${inCart?' added':''}" data-pid="${u.id}" onclick="toggleSepet(${u.id})">
      ${inCart
        ? `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Eklendi`
        : `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Sepete Ekle`}
    </button>
  </div>`;

  return `<div class="card">
    <div class="card-main">
      <div class="card-img">${img}</div>
      <div class="card-info">
        <div class="card-name">${u.ad}</div>
        ${u.agirlik_hacim ? `<span class="card-unit">${u.agirlik_hacim}</span>` : ''}
        ${halBlock}
      </div>
    </div>
    <div class="market-section">
      <div class="market-section-label">Market Fiyatları</div>
      ${mktRows || '<p class="hal-none">Market verisi yok</p>'}
    </div>
    ${savings}
    ${ekle}
  </div>`;
}

// ── KATEGORİ GRİD ─────────────────────────────────────
function renderCatGrid() {
  const cnt = {};
  for (const u of urunler) {
    const k = ustKategori(u.ana_kategori);
    cnt[k] = (cnt[k] || 0) + 1;
  }
  document.getElementById('home-cats').innerHTML = KATEGORILER.map(k => {
    const total = k.cats.reduce((s, c) => s + (cnt[c] || 0), 0);
    return `<div class="cat-card" onclick="openCategory('${k.slug}')">
      <div class="cat-card-emoji">${k.emoji}</div>
      <div class="cat-card-name">${k.label}</div>
      <div class="cat-card-count">${total} ürün</div>
    </div>`;
  }).join('');
}

// ── KATEGORİ EKRANI ───────────────────────────────────
function openCategory(slug) {
  const kat  = KATEGORILER.find(k => k.slug === slug);
  document.getElementById('cat-title').textContent = kat.label;
  const list = getList(kat.cats, '');
  document.getElementById('countNum').textContent = list.length;
  document.getElementById('productList').innerHTML = list.length
    ? list.map(cardHTML).join('')
    : `<div class="state-msg"><span class="icon">🔍</span>Bu kategoride ürün bulunamadı.</div>`;
  showScreen('screen-cat');
  document.getElementById('screen-cat').scrollTop = 0;
}

// ── ARAMA ─────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim();
  document.getElementById('home-cats').style.display   = q ? 'none' : '';
  document.getElementById('home-search').style.display = q ? 'block' : 'none';
  if (!q) return;
  const list = getList(null, q);
  document.getElementById('searchCount').textContent = list.length;
  document.getElementById('searchList').innerHTML = list.length
    ? list.map(cardHTML).join('')
    : `<div class="state-msg"><span class="icon">🔍</span>Sonuç bulunamadı.</div>`;
});

// ── SEPET ─────────────────────────────────────────────
function saveSepet() {
  localStorage.setItem('pazar_sepet', JSON.stringify(sepet));
  document.getElementById('sepetCount').textContent = sepet.length;
}

function toggleSepet(id) {
  if (sepet.find(s => s.id === id)) {
    sepet = sepet.filter(s => s.id !== id);
    saveSepet();
    setEkleBtns(id, false);
  } else {
    const u = urunler.find(u => u.id === id);
    if (!u) return;
    sepet.push({
      id: u.id, ad: u.ad, marka: u.marka, resim: u.resim,
      agirlik_hacim: u.agirlik_hacim, ana_kategori: u.ana_kategori, fiyatlar: u.fiyatlar
    });
    saveSepet();
    setEkleBtns(id, true);
  }
}

function setEkleBtns(id, inCart) {
  document.querySelectorAll(`.btn-ekle[data-pid="${id}"]`).forEach(btn => {
    btn.className = 'btn-ekle' + (inCart ? ' added' : '');
    btn.innerHTML = inCart
      ? `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Eklendi`
      : `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Sepete Ekle`;
  });
}

function removeFromSepet(id) {
  sepet = sepet.filter(s => s.id !== id);
  saveSepet();
  setEkleBtns(id, false);
  renderSepet();
}

function renderSepet() {
  document.getElementById('sepetCount').textContent = sepet.length;
  const el = document.getElementById('sepetContent');
  if (!sepet.length) {
    el.innerHTML = `<div class="state-msg"><span class="icon">🛒</span>Sepetiniz boş.<br>Ürün kartlarındaki + butonuna basın.</div>`;
    return;
  }
  const items = sepet.map(u => {
    const emoji = KAT_EMOJI[ustKategori(u.ana_kategori)] || '📦';
    const img   = u.resim
      ? `<img src="${u.resim}" alt="" loading="lazy" onerror="this.outerHTML='${emoji}'">`
      : emoji;
    const sub = [u.agirlik_hacim, u.marka].filter(Boolean).join(' · ');
    return `<div class="cart-item">
      <div class="cart-item-img">${img}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${u.ad}</div>
        ${sub ? `<div class="cart-item-sub">${sub}</div>` : ''}
      </div>
      <button class="cart-del" onclick="removeFromSepet(${u.id})">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="cart-list">${items}</div>
    <button class="btn-compare" onclick="karsilastir()">Marketleri Karşılaştır →</button>
    <div id="compareOut"></div>`;
}

// ── KARŞILAŞTIRMA ─────────────────────────────────────
function karsilastir() {
  const mkts = {};
  for (const item of sepet) {
    const byM = {};
    for (const f of (item.fiyatlar||[]).filter(f => f.fiyat != null)) {
      const k = f.market || 'diger';
      if (!byM[k] || f.fiyat < byM[k].fiyat) byM[k] = f;
    }
    for (const [k, f] of Object.entries(byM)) {
      if (!mkts[k]) mkts[k] = { name: MARKET_NAMES[k] || k, total: 0, count: 0 };
      mkts[k].total += f.fiyat;
      mkts[k].count += 1;
    }
  }
  const sorted = Object.values(mkts).sort((a,b) => b.count - a.count || a.total - b.total);
  if (!sorted.length) {
    document.getElementById('compareOut').innerHTML =
      `<div class="state-msg">Market fiyat verisi bulunamadı.</div>`;
    return;
  }
  const best   = sorted[0];
  const sec    = sorted.find(m => m.name !== best.name && m.count === best.count);
  const saving = sec ? sec.total - best.total : 0;
  const savHtml = saving > 0.01
    ? `<div class="compare-savings">💡 <span><b>${best.name}</b>'ten alırsan <b>${tl(saving)} tasarruf</b> edersin</span></div>`
    : '';
  const rows = sorted.map((m, i) => `
    <div class="compare-row${i === 0 ? ' best' : ''}">
      <div class="compare-rank">${i + 1}</div>
      <div class="compare-info">
        <div class="compare-mname">${m.name}</div>
        <div class="compare-detail">${m.count === sepet.length ? 'Tüm ürünler mevcut' : m.count + '/' + sepet.length + ' ürün'}</div>
      </div>
      <div class="compare-total">${tl(m.total)}</div>
    </div>`).join('');
  document.getElementById('compareOut').innerHTML = `
    <div class="compare-wrap">
      <div class="compare-title">Market Karşılaştırması</div>
      ${savHtml}${rows}
    </div>`;
}

// ── VERİ YÜKLE ────────────────────────────────────────
Promise.allSettled([
  fetch('/api/urunler').then(r => r.json()),
  fetch('/api/hal').then(r => r.json()),
]).then(([uR, hR]) => {
  if (uR.status === 'fulfilled' && uR.value.urunler) urunler = uR.value.urunler;
  if (hR.status === 'fulfilled' && hR.value.urunler) {
    for (const u of hR.value.urunler) {
      const k = norm(u.ad);
      if (!halMap[k] || (u.fiyat != null && u.fiyat < (halMap[k].fiyat ?? 9999))) halMap[k] = u;
    }
    const bt = hR.value.bulten_tarihi || '';
    if (bt) document.getElementById('halDate').innerHTML =
      `<span class="hal-badge">Hal: ${bt.slice(0, 10)}</span>`;
  }
  renderCatGrid();
  saveSepet();
});
</script>
</body>
</html>
