<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pazar — Haldeki fiyatı, markete gitmeden bil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:       #0F5132;
      --primary-mid:   #1D9E75;
      --primary-light: #ECFDF5;
      --primary-text:  #065F46;
      --border:        #E5E7EB;
      --border-green:  #D1FAE5;
      --bg:            #F9FAFB;
      --card:          #FFFFFF;
      --gray-400:      #9CA3AF;
      --gray-500:      #6B7280;
      --gray-900:      #111827;
      --radius-card:   16px;
      --shadow-card:   0 2px 12px rgba(0,0,0,.06);
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--gray-900);
      max-width: 600px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 76px;
    }

    /* ─── HEADER ─── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background-color: var(--primary);
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 24px,
        rgba(255,255,255,.04) 24px,
        rgba(255,255,255,.04) 25px
      );
      padding: 44px 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-brand { display: flex; align-items: center; gap: 12px; }

    .header-logo {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.18);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,.3);
    }
    .header-logo span {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.25rem;
      color: #fff;
      line-height: 1;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: #fff;
      letter-spacing: -.3px;
      line-height: 1.1;
    }
    .header-text p {
      font-size: .72rem;
      font-style: italic;
      color: rgba(255,255,255,.7);
      margin-top: 3px;
      font-weight: 400;
    }

    .header-bell {
      width: 38px; height: 38px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; position: relative;
    }
    .header-bell svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; }
    .bell-dot {
      position: absolute; top: 7px; right: 7px;
      width: 7px; height: 7px;
      background: #FCD34D;
      border-radius: 50%;
      border: 1.5px solid var(--primary);
    }

    /* ─── SEARCH ─── */
    .search-wrap {
      background: var(--card);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .search-inner { display: flex; align-items: center; gap: 10px; }

    .search-box {
      flex: 1;
      display: flex; align-items: center; gap: 9px;
      background: var(--card);
      border: 2px solid var(--border-green);
      border-radius: 10px;
      padding: 10px 13px;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-box:focus-within {
      border-color: var(--primary-mid);
      box-shadow: 0 0 0 3px rgba(29,158,117,.12);
    }
    .search-box svg { width: 16px; height: 16px; stroke: var(--gray-400); fill: none; stroke-width: 2; flex-shrink: 0; }
    .search-box input {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--gray-900);
    }
    .search-box input::placeholder { color: var(--gray-400); }

    .barcode-btn {
      width: 42px; height: 42px; flex-shrink: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .barcode-btn svg { width: 20px; height: 20px; stroke: var(--gray-500); fill: none; stroke-width: 1.5; }

    /* ─── CATEGORY PILLS ─── */
    .cat-wrap {
      background: var(--card);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .cat-scroll {
      display: flex; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }

    .cat-pill {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem; font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--gray-500);
      transition: all .15s;
      white-space: nowrap;
    }
    .cat-pill:hover { border-color: var(--primary); color: var(--primary); }
    .cat-pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ─── STATS ─── */
    .stats-row {
      padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: .74rem; color: var(--gray-400);
    }
    .stats-row b { color: var(--gray-900); font-weight: 600; }

    /* ─── LIST ─── */
    .product-list {
      padding: 4px 16px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.04);
    }

    .card-main {
      display: flex; gap: 13px;
      padding: 14px 14px 12px;
    }

    .card-img {
      width: 76px; height: 76px; flex-shrink: 0;
      border-radius: 10px;
      background: var(--bg);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }
    .card-img img { width: 100%; height: 100%; object-fit: contain; }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-size: .9rem; font-weight: 700;
      line-height: 1.35; color: var(--gray-900);
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-unit {
      display: inline-block; margin-top: 4px;
      font-size: .67rem; font-weight: 500;
      color: var(--gray-500);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px;
    }

    .hal-block { margin-top: 9px; }
    .hal-label {
      font-size: .62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--gray-500);
    }
    .hal-price-row { display: flex; align-items: baseline; gap: 5px; margin-top: 1px; }
    .hal-price {
      font-size: 1.3rem; font-weight: 700;
      color: var(--gray-900); line-height: 1.1;
    }
    .hal-unit-text { font-size: .72rem; color: var(--gray-400); font-weight: 500; }
    .hal-none { font-size: .75rem; color: var(--gray-400); margin-top: 8px; }

    /* ─── MARKET ROWS ─── */
    .market-section {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
    }
    .market-section-label {
      font-size: .62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--gray-400); margin-bottom: 7px;
    }
    .market-row {
      display: flex; align-items: center; gap: 9px;
      padding: 5px 0;
      border-top: 1px solid #F3F4F6;
    }
    .market-row:first-of-type { border-top: none; }

    .m-tag {
      font-size: .6rem; font-weight: 700; color: #fff;
      padding: 2px 8px; border-radius: 4px;
      min-width: 48px; text-align: center; flex-shrink: 0;
      letter-spacing: .02em;
    }
    .m-a101        { background: #DC2626; }
    .m-bim         { background: #B91C1C; }
    .m-carrefour   { background: #1D4ED8; }
    .m-migros      { background: #DC2626; }
    .m-sok         { background: #D97706; }
    .m-tarim_kredi { background: #15803D; }
    .m-default     { background: #6B7280; }

    .m-store { font-size: .75rem; color: var(--gray-500); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .m-price { font-size: .82rem; font-weight: 700; color: var(--gray-900); flex-shrink: 0; }
    .m-price.best { color: var(--primary); }

    /* ─── SAVINGS BAR ─── */
    .savings-bar {
      padding: 9px 14px;
      font-size: .77rem; font-weight: 600;
      display: flex; align-items: center; gap: 7px;
      border-top: 1px solid var(--border);
    }
    .savings-bar.cheaper {
      background: var(--primary-light);
      color: var(--primary-text);
    }
    .savings-bar.pricier { background: #FEF2F2; color: #991B1B; }
    .savings-bar.equal   { background: var(--bg); color: var(--gray-500); }

    .savings-icon {
      width: 17px; height: 17px; flex-shrink: 0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 800;
    }
    .cheaper .savings-icon { background: var(--primary-text); color: #fff; }
    .pricier .savings-icon { background: #991B1B; color: #fff; }
    .equal   .savings-icon { background: var(--gray-400); color: #fff; }

    /* ─── STATE ─── */
    .state-msg {
      text-align: center; padding: 60px 24px;
      color: var(--gray-400); font-size: .9rem;
    }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 600px;
      background: var(--card);
      box-shadow: 0 -1px 0 var(--border), 0 -4px 16px rgba(0,0,0,.06);
      display: flex; z-index: 200;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px 4px 14px; gap: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: .62rem; font-weight: 600;
      color: var(--gray-400);
      background: none; border: none; cursor: pointer;
    }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nav-btn.active      { color: var(--primary); }
    .nav-btn.active svg  { stroke: var(--primary); }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo"><span>P</span></div>
    <div class="header-text">
      <h1>Pazar</h1>
      <p>Haldeki fiyatı, markete gitmeden bil</p>
    </div>
  </div>
  <div class="header-bell">
    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
    <span class="bell-dot"></span>
  </div>
</header>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Ürün ara..." autocomplete="off" />
    </div>
    <div class="barcode-btn" title="Barkod Tara">
      <svg viewBox="0 0 24 24"><path d="M3 5h2M7 5h1M11 5h3M17 5h1M21 5h-2M3 7v10M21 7v10M3 19h2M7 19h1M11 19h3M17 19h1M21 19h-2M7 7v10M11 7v10M15 7v10M17 7v10"/></svg>
    </div>
  </div>
</div>

<!-- CATEGORY PILLS -->
<div class="cat-wrap">
  <div class="cat-scroll" id="catScroll">
    <button class="cat-pill active" data-cat="tumu">Tümü</button>
    <button class="cat-pill" data-cat="meyve">🍎 Meyve</button>
    <button class="cat-pill" data-cat="sebze">🥦 Sebze</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-row">
  <span><b id="countNum">—</b> ürün listeleniyor</span>
  <span id="halDate"></span>
</div>

<!-- PRODUCTS -->
<div class="product-list" id="productList">
  <div class="state-msg">⏳ Veriler yükleniyor…</div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Ana Sayfa
  </button>
  <button class="nav-btn">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.97-1.67L23 6H6"/></svg>
    Sepetim
  </button>
  <button class="nav-btn">
    <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    Fırsatlar
  </button>
  <button class="nav-btn">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profil
  </button>
</nav>

<script>
const MARKET_AD = {
  a101: 'A101', bim: 'BİM', carrefour: 'CarrefourSA',
  migros: 'Migros', sok: 'ŞOK', tarim_kredi: 'T.Kredi'
};

let tumUrunler = [], halMap = {}, aktifKat = 'tumu';

function norm(s) {
  return (s || '').toLowerCase()
    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9 ]/g,'').trim();
}

function halEsles(u) {
  const mW = norm(u.ad).split(/\s+/).filter(w => w.length > 2);
  let best = null, bestScore = 0;
  for (const [key, rec] of Object.entries(halMap)) {
    const hW = key.split(/\s+/).filter(w => w.length > 2);
    if (!hW.length || !mW.length) continue;
    const score = hW.filter(w => mW.includes(w)).length / Math.max(hW.length, mW.length);
    if (score > bestScore) { bestScore = score; best = rec; }
  }
  return bestScore >= 0.5 ? best : null;
}

function kategori(u) {
  const k = (u.kategoriler || []).join(' ').toLowerCase();
  if (k.includes('meyve')) return 'meyve';
  if (k.includes('sebze')) return 'sebze';
  const t = norm(u.top_kategori || u.ana_kategori || '');
  if (t.includes('meyve')) return 'meyve';
  if (t.includes('sebze')) return 'sebze';
  return 'diger';
}

function tl(v) {
  if (v == null) return '—';
  return v.toLocaleString('tr-TR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' ₺';
}

Promise.allSettled([
  fetch('/api/urunler').then(r => r.json()),
  fetch('/api/hal').then(r => r.json()),
]).then(([uR, hR]) => {
  if (uR.status === 'fulfilled' && uR.value.urunler) {
    tumUrunler = uR.value.urunler;
  }
  if (hR.status === 'fulfilled' && hR.value.urunler) {
    hR.value.urunler.forEach(u => {
      const k = norm(u.ad);
      if (!halMap[k] || (u.fiyat != null && u.fiyat < (halMap[k].fiyat ?? 9999)))
        halMap[k] = u;
    });
    const bt = hR.value.bulten_tarihi || '';
    document.getElementById('halDate').textContent = bt ? `Hal: ${bt.slice(0,10)}` : '';
  }
  render();
});

function getList() {
  const q = norm(document.getElementById('search').value);
  return tumUrunler
    .filter(u => halEsles(u) !== null)
    .filter(u => aktifKat === 'tumu' || kategori(u) === aktifKat)
    .filter(u => !q || norm(u.ad).includes(q) || norm(u.marka || '').includes(q));
}

function cardHTML(u) {
  const hal       = halEsles(u);
  const halFiyat  = hal?.fiyat ?? null;
  const marketler = (u.fiyatlar || []).filter(f => f.fiyat != null).sort((a,b) => a.fiyat - b.fiyat);
  const minMarket = marketler[0]?.fiyat ?? null;

  const imgInner = u.resim
    ? `<img src="${u.resim}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '🛒';

  const halBlock = halFiyat != null
    ? `<div class="hal-block">
        <div class="hal-label">Hal Fiyatı</div>
        <div class="hal-price-row">
          <span class="hal-price">${tl(halFiyat)}</span>
          <span class="hal-unit-text">/ ${hal.birim || 'Kg'}</span>
        </div>
       </div>`
    : `<p class="hal-none">Hal verisi bulunamadı</p>`;

  const marketRows = marketler.slice(0, 4).map((f, i) => `
    <div class="market-row">
      <span class="m-tag m-${f.market || 'default'}">${MARKET_AD[f.market] || f.market || '?'}</span>
      <span class="m-store">${f.depo_adi || ''}</span>
      <span class="m-price${i === 0 ? ' best' : ''}">${tl(f.fiyat)}</span>
    </div>`).join('');

  let savingsBar = '';
  if (halFiyat != null && minMarket != null) {
    const diff = minMarket - halFiyat;
    if (diff > 0.01) {
      savingsBar = `<div class="savings-bar cheaper">
        <span class="savings-icon">✓</span>
        Halde <strong>${tl(diff)} daha ucuz</strong>&nbsp;· En ucuz market: ${tl(minMarket)}
      </div>`;
    } else if (diff < -0.01) {
      savingsBar = `<div class="savings-bar pricier">
        <span class="savings-icon">↓</span>
        Market <strong>${tl(-diff)} daha ucuz</strong>&nbsp;· Hal fiyatı: ${tl(halFiyat)}
      </div>`;
    } else {
      savingsBar = `<div class="savings-bar equal">
        <span class="savings-icon">≈</span>
        Hal ve market fiyatı birbirine yakın
      </div>`;
    }
  }

  return `<div class="card">
    <div class="card-main">
      <div class="card-img">${imgInner}</div>
      <div class="card-info">
        <div class="card-name">${u.ad}</div>
        ${u.agirlik_hacim ? `<span class="card-unit">${u.agirlik_hacim}</span>` : ''}
        ${halBlock}
      </div>
    </div>
    ${marketRows ? `<div class="market-section">
      <div class="market-section-label">Market Fiyatları</div>
      ${marketRows}
    </div>` : ''}
    ${savingsBar}
  </div>`;
}

function render() {
  const list = getList();
  document.getElementById('countNum').textContent = list.length;
  document.getElementById('productList').innerHTML = list.length
    ? list.map(cardHTML).join('')
    : '<div class="state-msg">🔍 Ürün bulunamadı.</div>';
}

document.getElementById('search').addEventListener('input', render);

document.getElementById('catScroll').addEventListener('click', e => {
  const pill = e.target.closest('.cat-pill');
  if (!pill) return;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  aktifKat = pill.dataset.cat;
  render();
});

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>
</body>
</html>
