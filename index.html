<!-- GitHub Pages Test -->
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Pazar — Haldeki fiyatı, markete gitmeden bil</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F5132">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pazar">
  <meta name="color-scheme" content="light only">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0F5132;
      --primary-light: #1D9E75;
      --bg: #F8F9FA;
      --card-bg: #FFFFFF;
      --text: #1A1A2E;
      --text-muted: #6B7280;
      --border: #E5E7EB;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── EKRANLAR ── */
    .screen {
      display: none;
      min-height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
      background: var(--bg);
      padding-bottom: 76px;
    }
    #screen-home { display: block; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #0F5132 0%, #1D9E75 100%);
      padding: 20px 16px 18px;
      display: flex; align-items: center; gap: 13px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 12px rgba(15,81,50,.25);
    }
    .header-logo {
      width: 44px; height: 44px; border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif; font-size: 1.25rem; font-weight: 800;
      color: var(--primary); flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .header-text h1 {
      font-family: 'Inter', sans-serif; font-size: 1.4rem; font-weight: 800;
      color: #fff; line-height: 1; letter-spacing: -.3px;
    }
    .header-text p { font-size: .68rem; color: rgba(255,255,255,.75); margin-top: 3px; font-weight: 500; }

    .header-sub {
      background: linear-gradient(135deg, #0F5132 0%, #1D9E75 100%);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 12px rgba(15,81,50,.25);
    }
    .header-sub h2 {
      font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; color: #fff;
    }
    .back-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      background: rgba(255,255,255,.2); border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.2s ease;
    }
    .back-btn:active { background: rgba(255,255,255,.35); }
    .back-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; }

    /* ── ARAMA ── */
    .search-wrap {
      background: var(--card-bg);
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      display: flex; align-items: center; gap: 9px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 10px 13px;
      transition: all 0.2s ease;
    }
    .search-box:focus-within {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(15,81,50,.08);
    }
    .search-box svg { width: 16px; height: 16px; stroke: var(--primary); fill: none; stroke-width: 2; flex-shrink: 0; }
    .search-box input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: .875rem; color: var(--text); font-family: 'Inter', sans-serif; font-weight: 400;
    }
    .search-box input::placeholder { color: var(--text-muted); }

    /* ── KATEGORİ GRİD ── */
    .cat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 16px 14px 0;
    }
    .cat-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 22px 12px 18px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      cursor: pointer; transition: all 0.2s ease; user-select: none;
    }
    .cat-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.13); transform: translateY(-2px); }
    .cat-card:active { transform: scale(.96); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .cat-card-emoji { font-size: 3rem; line-height: 1; }
    .cat-card-name { font-size: .84rem; font-weight: 700; color: var(--text); text-align: center; line-height: 1.35; }
    .cat-card-count { font-size: .68rem; color: var(--text-muted); font-weight: 500; }

    /* ── STATS ── */
    .stats-row {
      padding: 8px 16px; font-size: .72rem; color: var(--text-muted);
      display: flex; justify-content: space-between; align-items: center;
    }
    .stats-row b { color: var(--text); font-weight: 600; }
    .hal-badge {
      font-size: .66rem; font-weight: 600; color: var(--primary);
      background: #ECFDF5; border: 1px solid #D1FAE5; border-radius: 6px; padding: 3px 8px;
    }

    /* ── ÜRÜN LİSTESİ ── */
    .product-list { padding: 6px 14px 20px; display: flex; flex-direction: column; gap: 10px; }

    /* ── ÜRÜN KARTI ── */
    .card {
      background: var(--card-bg); border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      overflow: hidden; transition: all 0.2s ease;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); }
    .card-main { display: flex; gap: 12px; padding: 14px 14px 10px; }
    .card-img {
      width: 64px; height: 64px; flex-shrink: 0; border-radius: 12px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 1.6rem; overflow: hidden;
    }
    .card-img img { width: 100%; height: 100%; object-fit: contain; }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: .875rem; font-weight: 700; color: var(--text); line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-unit {
      display: inline-block; margin-top: 4px;
      font-size: .63rem; font-weight: 600; color: var(--text-muted);
      background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 2px 6px;
    }
    .hal-block { margin-top: 8px; }
    .hal-label {
      font-size: .58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted);
    }
    .hal-price {
      font-size: 1.3rem; font-weight: 800; color: var(--primary);
      line-height: 1; letter-spacing: -.5px;
    }
    .hal-unit-text { font-size: .68rem; color: var(--text-muted); margin-left: 3px; }
    .hal-none { font-size: .73rem; color: var(--text-muted); margin-top: 8px; font-style: italic; }

    /* ── MARKET BÖLÜMÜ ── */
    .market-section { border-top: 1px solid var(--border); padding: 9px 14px; }
    .market-section-label {
      font-size: .58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted); margin-bottom: 7px;
    }
    .market-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-top: 1px solid var(--bg);
    }
    .market-row:first-child { border-top: none; }
    .m-tag {
      font-size: .56rem; font-weight: 700; color: #fff; padding: 3px 7px;
      border-radius: 5px; min-width: 50px; text-align: center; flex-shrink: 0;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .m-a101 { background: #DC2626; } .m-bim { background: #7F1D1D; }
    .m-carrefour { background: #1D4ED8; } .m-migros { background: #E53E3E; }
    .m-sok { background: #D97706; } .m-tarim_kredi { background: var(--primary); }
    .m-default { background: var(--text-muted); }
    .m-store {
      font-size: .72rem; color: var(--text-muted); flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400;
    }
    .m-price { font-size: .8rem; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .m-price.best { color: var(--primary); }

    /* ── TASARRUF BARI ── */
    .savings-bar {
      padding: 9px 14px; font-size: .74rem; font-weight: 600;
      display: flex; align-items: center; gap: 7px; border-top: 1px solid var(--border);
    }
    .savings-bar.cheaper { background: #ECFDF5; color: #065F46; }
    .savings-bar.pricier { background: #FEF2F2; color: #991B1B; }
    .savings-bar.equal   { background: var(--bg); color: var(--text-muted); }

    /* ── SEPETE EKLE ── */
    .card-footer { display: flex; justify-content: flex-end; padding: 0 14px 12px; }
    .btn-ekle {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; background: var(--primary); color: #fff;
      border: none; border-radius: 9px;
      font-size: .72rem; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }
    .btn-ekle:hover { background: var(--primary-light); }
    .btn-ekle:active { transform: scale(.96); }
    .btn-ekle.added { background: var(--text-muted); }
    .btn-ekle svg { width: 11px; height: 11px; stroke: #fff; fill: none; stroke-width: 2.5; }

    /* ── SEPET ── */
    .cart-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 9px; }
    .cart-item {
      background: var(--card-bg); border-radius: 14px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      transition: all 0.2s ease;
    }
    .cart-item-img {
      width: 44px; height: 44px; flex-shrink: 0; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem; overflow: hidden;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: contain; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name {
      font-size: .83rem; font-weight: 700; color: var(--text); line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cart-item-sub { font-size: .67rem; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
    .cart-del {
      width: 30px; height: 30px; flex-shrink: 0;
      background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.2s ease;
    }
    .cart-del:hover { background: #FEE2E2; }
    .cart-del svg { width: 13px; height: 13px; stroke: #DC2626; fill: none; stroke-width: 2; }
    .btn-compare {
      display: block; margin: 8px 14px 4px; width: calc(100% - 28px);
      padding: 14px; background: var(--primary); color: #fff;
      border: none; border-radius: 14px;
      font-size: .9rem; font-weight: 700; cursor: pointer; text-align: center;
      font-family: 'Inter', sans-serif; letter-spacing: .01em;
      transition: all 0.2s ease;
    }
    .btn-compare:hover { background: var(--primary-light); }

    /* ── KARŞILAŞTIRMA ── */
    .compare-wrap { padding: 12px 14px 20px; }
    .cmp-sec-label {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted); margin-bottom: 10px;
    }
    .cmp-opt-cards { display: flex; flex-direction: column; gap: 8px; }
    .cmp-opt {
      background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 14px;
      padding: 13px 14px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer; transition: all .18s;
    }
    .cmp-opt:active { transform: scale(.98); }
    .cmp-opt.selected { background: #ECFDF5; border-color: #6EE7B7; }
    .cmp-opt.unavail { opacity: .45; cursor: default; }
    .cmp-opt-title { font-size: .85rem; font-weight: 700; color: var(--text); }
    .cmp-opt.selected .cmp-opt-title { color: #065F46; }
    .cmp-opt-sub { font-size: .7rem; color: var(--text-muted); margin-top: 2px; }
    .cmp-opt-right { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .cmp-opt-price { font-size: .95rem; font-weight: 800; color: var(--text); }
    .cmp-opt.selected .cmp-opt-price { color: #065F46; }
    .cmp-opt-save { font-size: .72rem; color: #059669; font-weight: 600; margin-top: 2px; }
    .cmp-detail { margin-top: 14px; }
    .cmp-mkt-block {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
      padding: 12px 14px; margin-bottom: 8px;
    }
    .cmp-mkt-name { font-size: .8rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .cmp-mkt-item {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .8rem;
    }
    .cmp-mkt-item:last-of-type { border-bottom: none; }
    .cmp-mkt-item-name {
      color: var(--text); flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px;
    }
    .cmp-mkt-item-price { font-weight: 700; color: var(--text); flex-shrink: 0; }
    .cmp-mkt-subtotal {
      text-align: right; font-size: .78rem; font-weight: 700;
      color: var(--text-muted); margin-top: 8px; padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .cmp-grand {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; font-size: .9rem; font-weight: 800; color: var(--text);
      background: var(--bg); border-radius: 14px; margin-bottom: 6px;
      border: 1px solid var(--border);
    }
    .cmp-grand-save { background: #ECFDF5; border-color: #D1FAE5; color: #065F46; }

    /* ── DETAY EKRANI ── */
    .detay-img-wrap {
      display: flex; justify-content: center; align-items: center;
      background: var(--bg); padding: 24px 16px; min-height: 180px; font-size: 5rem;
    }
    .detay-img-wrap img {
      max-width: 180px; max-height: 180px; object-fit: contain; border-radius: 12px;
    }
    .detay-info { padding: 16px 16px 4px; }
    .detay-name { font-size: 1.15rem; font-weight: 800; color: var(--text); line-height: 1.3; }
    .detay-unit { font-size: .82rem; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
    .detay-marka { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
    .detay-section { padding: 14px 16px 0; }
    .detay-sec-label {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted); margin-bottom: 10px;
    }
    .detay-hal-box {
      background: #ECFDF5; border: 1px solid #D1FAE5; border-radius: 14px; padding: 14px 16px;
    }
    .detay-hal-price { font-size: 2rem; font-weight: 800; color: #065F46; line-height: 1.1; }
    .detay-hal-desc { font-size: .75rem; color: #047857; margin-top: 5px; }
    .detay-mkt-list {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
    }
    .detay-mkt-row {
      display: flex; align-items: center; gap: 10px; padding: 11px 14px;
      border-bottom: 1px solid var(--border);
    }
    .detay-mkt-row:last-child { border-bottom: none; }
    .detay-mkt-row.best { background: #F0FDF4; }
    .detay-mkt-store { flex: 1; font-size: .72rem; color: var(--text-muted); }
    .detay-mkt-price { font-size: .88rem; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .detay-mkt-row.best .detay-mkt-price { color: #059669; font-size: .95rem; }
    .detay-mkt-row.worst .detay-mkt-price { text-decoration: line-through; color: var(--text-muted); font-weight: 500; }
    .detay-btn-ekle {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin: 20px 16px 24px; padding: 15px; border: none; border-radius: 14px;
      width: calc(100% - 32px); background: var(--primary); color: #fff;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: background .18s;
    }
    .detay-btn-ekle.added { background: #059669; }
    .detay-btn-ekle svg {
      width: 18px; height: 18px; stroke: currentColor; fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── SKELETON LOADING ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-card {
      background: var(--card-bg); border-radius: 16px;
      border: 1px solid var(--border); padding: 14px; display: flex; gap: 12px;
    }
    .skeleton-img { width: 64px; height: 64px; border-radius: 12px; flex-shrink: 0; }
    .skeleton-body { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
    .skeleton-line { height: 12px; }
    .skeleton-line.short { width: 55%; }
    .skeleton-line.price { height: 20px; width: 40%; }

    /* ── MARKET FİLTRE ── */
    .filter-wrap {
      display: flex; gap: 6px; overflow-x: auto; padding: 8px 14px;
      background: var(--card-bg); border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .filter-wrap::-webkit-scrollbar { display: none; }
    .filter-pill {
      flex-shrink: 0; padding: 5px 13px; border-radius: 999px;
      border: 1.5px solid var(--border); background: var(--bg);
      font-size: .7rem; font-weight: 600; color: var(--text-muted);
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all .15s; white-space: nowrap;
    }
    .filter-pill.active {
      background: var(--primary); border-color: var(--primary); color: #fff;
    }
    .filter-pill:not(.active):hover { border-color: var(--primary); color: var(--primary); }

    /* ── KOMPAKT KART ── */
    .card { max-height: 90px; }
    .card-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    }
    .card-img { width: 60px; height: 60px; }
    .card-name {
      font-size: .82rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-hal-badge { font-size: .6rem; color: #059669; font-weight: 600; }
    .card-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .card-right {
      display: flex; flex-direction: column; align-items: flex-end;
      justify-content: space-between; height: 60px; flex-shrink: 0;
    }
    .card-price { font-size: 1rem; font-weight: 800; color: var(--primary); white-space: nowrap; line-height: 1; }
    .card-mkt-lbl { font-size: .6rem; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
    .btn-ekle {
      width: 28px; height: 28px; border: none; border-radius: 8px;
      background: var(--primary); color: #fff;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .18s;
    }
    .btn-ekle.added { background: #059669; }
    .btn-ekle:active { transform: scale(.9); }

    /* ── BOŞLUK / MESAJ ── */
    .state-msg {
      text-align: center; padding: 60px 24px;
      color: var(--text-muted); font-size: .88rem; line-height: 1.6; font-weight: 500;
    }
    .state-msg .icon { font-size: 2.8rem; display: block; margin-bottom: 12px; }

    /* ── ALT NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 600px;
      background: var(--card-bg); border-top: 1px solid var(--border);
      box-shadow: 0 -4px 20px rgba(0,0,0,.07);
      display: flex; z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 9px 4px 14px; gap: 3px;
      background: none; border: none; cursor: pointer;
      font-size: .58rem; font-weight: 600; color: var(--text-muted); letter-spacing: .02em;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nav-btn.active { color: var(--primary); }
    .cart-badge {
      background: var(--primary); color: #fff; border-radius: 999px;
      font-size: .5rem; font-weight: 700; padding: 1px 5px; line-height: 1.5;
      min-width: 16px; text-align: center; display: inline-block; margin-left: 2px;
    }
  </style>
</head>
<body>

<!-- ══ EKRAN 1: ANA SAYFA ══ -->
<div id="screen-home" class="screen">

  <header class="header">
    <div class="header-logo">P</div>
    <div class="header-text">
      <h1>Pazar</h1>
      <p>Haldeki fiyatı, markete gitmeden bil</p>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Tüm kategorilerde ara… örn. domates" autocomplete="off">
    </div>
  </div>

  <div id="home-cats" class="cat-grid"></div>

  <div id="home-search" style="display:none">
    <div class="stats-row"><span><b id="searchCount">0</b> sonuç</span></div>
    <div class="product-list" id="searchList"></div>
  </div>

</div>

<!-- ══ EKRAN 2: KATEGORİ ══ -->
<div id="screen-cat" class="screen">

  <header class="header-sub">
    <button class="back-btn" onclick="showScreen('screen-home')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 id="cat-title">Kategori</h2>
  </header>

  <div class="filter-wrap">
    <button class="filter-pill active" data-market="all"         onclick="setMarketFilter(null)">Tümü</button>
    <button class="filter-pill"        data-market="a101"        onclick="setMarketFilter('a101')">A101</button>
    <button class="filter-pill"        data-market="bim"         onclick="setMarketFilter('bim')">BİM</button>
    <button class="filter-pill"        data-market="migros"      onclick="setMarketFilter('migros')">Migros</button>
    <button class="filter-pill"        data-market="carrefour"   onclick="setMarketFilter('carrefour')">CarrefourSA</button>
    <button class="filter-pill"        data-market="sok"         onclick="setMarketFilter('sok')">ŞOK</button>
    <button class="filter-pill"        data-market="tarim_kredi" onclick="setMarketFilter('tarim_kredi')">Tarım Kredi</button>
  </div>

  <div class="stats-row">
    <span><b id="countNum">—</b> ürün listeleniyor</span>
    <span id="halDate"></span>
  </div>

  <div class="product-list" id="productList"></div>
  <div id="scroll-sentinel" style="height:1px;margin-bottom:8px"></div>

</div>

<!-- ══ EKRAN 3: SEPET ══ -->
<div id="screen-sepet" class="screen">

  <header class="header-sub">
    <button class="back-btn" onclick="showScreen('screen-home')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2>Sepetim</h2>
  </header>

  <div id="sepetContent">
    <div class="state-msg"><span class="icon">🛒</span>Sepetiniz boş.<br>Ürün kartlarındaki + butonuna basın.</div>
  </div>

</div>

<!-- ══ EKRAN 4: DETAY ══ -->
<div id="screen-detay" class="screen">
  <header class="header-sub">
    <button class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2>Ürün Detayı</h2>
  </header>
  <div id="detayContent"></div>
</div>

<!-- ALT NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navHome" onclick="showScreen('screen-home')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Ana Sayfa
  </button>
  <button class="nav-btn" id="navSepet" onclick="goSepet()">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.97-1.67L23 6H6"/></svg>
    Sepetim<span id="sepetCount" class="cart-badge">0</span>
  </button>
  <button class="nav-btn" onclick="alert('Yakında!')">
    <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    Fırsatlar
  </button>
  <button class="nav-btn" onclick="alert('Yakında!')">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profil
  </button>
</nav>

<script>
// ── SABİTLER ──────────────────────────────────────────
const MARKET_NAMES = {
  a101:'A101', bim:'BİM', carrefour:'CarrefourSA',
  migros:'Migros', sok:'ŞOK', tarim_kredi:'T.Kredi'
};
const KAT_EMOJI = {
  meyve:'🍎', sebze:'🥦', et:'🥩', sut:'🧀',
  gida:'🥫', icecek:'🥤', temizlik:'🧴', diger:'📦'
};
const KATEGORILER = [
  { slug:'meyve-sebze', label:'Meyve & Sebze', emoji:'🍎', file:'urunler_meyve' },
  { slug:'et',          label:'Et & Tavuk',    emoji:'🥩', file:'urunler_et'    },
  { slug:'sut',         label:'Süt & Kahvaltı',emoji:'🧀', file:'urunler_sut'   },
  { slug:'gida',        label:'Temel Gıda',    emoji:'🥫', file:'urunler_gida'  },
  { slug:'icecek',      label:'İçecek',        emoji:'🥤', file:'urunler_icecek'},
  { slug:'temizlik',    label:'Temizlik',       emoji:'🧴', file:'urunler_temizlik'},
];
const PAGE_SIZE = 48;

// ── DURUM ─────────────────────────────────────────────
let halMap = {};
let catCache = {};    // slug → [products with _id]
let productMap = {};  // _id → product
let urunler = [];     // görünen ürünler (toggleSepet için)
let currentKategori = null, currentSayfa = 1, toplamSayfa = 1, yukleniyor = false;
let activeMarket = null;
let _prevScreen = 'screen-home';

// Eski format sepeti temizle (id → _id migrasyonu)
let _rawSepet = JSON.parse(localStorage.getItem('pazar_sepet') || '[]');
if (_rawSepet.length && _rawSepet[0].id !== undefined && _rawSepet[0]._id === undefined) {
  _rawSepet = [];
  localStorage.setItem('pazar_sepet', '[]');
}
let sepet = _rawSepet;

// ── NAVİGASYON ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (id === 'screen-home')  document.getElementById('navHome').classList.add('active');
  if (id === 'screen-sepet') document.getElementById('navSepet').classList.add('active');
}

function goSepet() { renderSepet(); showScreen('screen-sepet'); }

function goBack() {
  if (_prevScreen === 'screen-sepet') renderSepet();
  showScreen(_prevScreen);
}

function openDetay(urunId) {
  const screens = ['screen-home', 'screen-cat', 'screen-sepet'];
  _prevScreen = screens.find(id => {
    const el = document.getElementById(id);
    return el && el.style.display !== 'none';
  }) || 'screen-home';

  let u = productMap[urunId] || sepet.find(s => s._id === urunId);
  if (!u) return;

  const hal      = halEsles(u);
  const halFiyat = hal?.fiyat ?? null;
  const mktler   = (u.market_fiyatlari || []).filter(f => f.fiyat != null).sort((a, b) => a.fiyat - b.fiyat);
  const emoji    = KAT_EMOJI[ustKategori(u.ana_kategori)] || '📦';
  const imgHtml  = u.resim
    ? `<img src="${u.resim}" alt="" loading="lazy" onerror="this.outerHTML='${emoji}'">`
    : emoji;

  const halSection = halFiyat != null ? `
    <div class="detay-section">
      <div class="detay-sec-label">Hal Fiyatı</div>
      <div class="detay-hal-box">
        <div class="detay-hal-price">${tl(halFiyat)}</div>
        <div class="detay-hal-desc">Toptancı hal fiyatı · ${hal.birim || 'Kg'}</div>
      </div>
    </div>` : '';

  const mktRows = mktler.map((f, i) => {
    const isFirst = i === 0, isLast = i === mktler.length - 1 && mktler.length > 1;
    return `<div class="detay-mkt-row${isFirst ? ' best' : isLast ? ' worst' : ''}">
      <span class="m-tag m-${f.market || 'default'}">${MARKET_NAMES[f.market] || f.market || '?'}</span>
      <span class="detay-mkt-price">${tl(f.fiyat)}</span>
    </div>`;
  }).join('');

  const inCart = sepet.some(s => s._id === urunId);
  const btnHtml = `<button id="detayEkleBtn" class="detay-btn-ekle${inCart ? ' added' : ''}"
    onclick="toggleSepet('${u._id}'); renderDetayBtn('${u._id}')">
    ${inCart
      ? `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Sepette`
      : `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Sepete Ekle`}
  </button>`;

  document.getElementById('detayContent').innerHTML = `
    <div class="detay-img-wrap">${imgHtml}</div>
    <div class="detay-info">
      <div class="detay-name">${u.ad}</div>
      ${u.agirlik_hacim ? `<div class="detay-unit">${u.agirlik_hacim}</div>` : ''}
    </div>
    ${halSection}
    <div class="detay-section">
      <div class="detay-sec-label">Market Fiyatları</div>
      <div class="detay-mkt-list">
        ${mktRows || '<div style="padding:12px 14px;font-size:.82rem;color:var(--text-muted)">Market verisi yok</div>'}
      </div>
    </div>
    ${btnHtml}`;

  showScreen('screen-detay');
  document.getElementById('screen-detay').scrollTop = 0;
}

function renderDetayBtn(urunId) {
  const btn = document.getElementById('detayEkleBtn');
  if (!btn) return;
  const inCart = sepet.some(s => s._id === urunId);
  btn.className = 'detay-btn-ekle' + (inCart ? ' added' : '');
  btn.innerHTML = inCart
    ? `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Sepette`
    : `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Sepete Ekle`;
}

// ── YARDIMCILAR ───────────────────────────────────────
function norm(s) {
  return (s||'').toLowerCase()
    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9 ]/g,'').trim();
}

function tl(v) {
  return v == null ? '—' :
    v.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' ₺';
}

function ustKategori(k) {
  k = k || '';
  if (['Meyve'].includes(k)) return 'meyve';
  if (['Sebze'].includes(k)) return 'sebze';
  if (['Şarküteri','Beyaz Et','Kırmızı Et','Deniz Ürünleri','Sakatat'].includes(k)) return 'et';
  if (['Süt','Yoğurt','Peynir','Tereyağı ve Margarin','Kaymak ve Krema','Yumurta',
       'Zeytin','Bal ve Reçel','Helva Tahin ve Pekmez','Kahvaltılık Gevrek Bar ve Granola',
       'Sürülebilir Ürünler ve Kahvaltılık Soslar','Ayran ve Kefir'].includes(k)) return 'sut';
  if (['Mantı Makarna ve Erişte','Pasta Malzemeleri','Hazır Gıda','Bakliyat',
       'Ekmek ve Unlu Mamüller','Konserve','Salça','Ketçap Mayonez Sos ve Sirkeler',
       'Sıvı Yağlar','Tuz Baharat ve Harçlar','Şeker ve Tatlandırıcılar',
       'Turşu','Un ve İrmik','Bebek Mamaları'].includes(k)) return 'gida';
  if (['Meyve Suyu','Su','Maden Suyu','Çay ve Bitki Çayları',
       'Gazsız İçecekler','Gazlı İçecekler','Kahve'].includes(k)) return 'icecek';
  if (['Bulaşık Temizlik Ürünleri','Kağıt Havlu','Kağıt Peçete ve Mendil',
       'Genel Temizlik Ürünleri','Hijyenik Ped','Çamaşır Temizlik Ürünleri',
       'Saç Bakım','Cilt Bakımı','Parfüm Deodorant Kolonya ve Kokular',
       'Mutfak Sarf Malzemeleri','Duş Banyo ve Sabun','Ağız Bakım',
       'Bebek ve Hasta Bezi','Temizlik ve Kişisel Bakım'].includes(k)) return 'temizlik';
  return 'diger';
}

function halEsles(u) {
  const mW = norm(u.ad).split(/\s+/).filter(w => w.length > 2);
  let best = null, bestSc = 0;
  for (const [key, rec] of Object.entries(halMap)) {
    const hW = key.split(/\s+/).filter(w => w.length > 2);
    if (!hW.length || !mW.length) continue;
    const sc = hW.filter(w => mW.includes(w)).length / Math.max(hW.length, mW.length);
    if (sc > bestSc) { bestSc = sc; best = rec; }
  }
  return bestSc >= 0.5 ? best : null;
}

// ── SKELETON ──────────────────────────────────────────
function skeletonHTML(n = 4) {
  return Array(n).fill(`
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line short"></div>
        <div class="skeleton skeleton-line price"></div>
      </div>
    </div>`).join('');
}

// ── ID ATAMA & KATEGORİ YÜKLEME ───────────────────────
function assignIds(slug, products) {
  products.forEach((u, i) => {
    u._id = slug + '_' + i;
    productMap[u._id] = u;
  });
  return products;
}

async function loadCat(slug) {
  if (catCache[slug]) return catCache[slug];
  const kat = KATEGORILER.find(k => k.slug === slug);
  const resp = await fetch('./data/' + kat.file + '.json');
  const data = await resp.json();
  const products = Array.isArray(data) ? data : (data.urunler || []);
  assignIds(slug, products);
  catCache[slug] = products;
  return products;
}

// ── KART HTML ─────────────────────────────────────────
function cardHTML(u) {
  const mktler  = (u.market_fiyatlari || []).filter(f => f.fiyat != null).sort((a,b) => a.fiyat - b.fiyat);
  const cheapest = mktler[0];
  const emoji   = KAT_EMOJI[ustKategori(u.ana_kategori)] || '📦';
  const img     = u.resim
    ? `<img src="${u.resim}" alt="" loading="lazy" onerror="this.outerHTML='${emoji}'">`
    : emoji;

  const hal = halEsles(u);
  const halFiyat = hal?.fiyat ?? null;
  const halBadge = halFiyat != null
    ? `<span class="card-hal-badge">Hal: ${tl(halFiyat)}</span>` : '';

  const marketList = (u.market_fiyatlari || []).map(f => f.market || '').join(',');

  const inCart = sepet.some(s => s._id === u._id);
  return `<div class="card" data-urun-id="${u._id}" data-markets="${marketList}" onclick="openDetay('${u._id}')" style="cursor:pointer">
    <div class="card-row">
      <div class="card-img">${img}</div>
      <div class="card-mid">
        <div class="card-name">${u.ad}</div>
        ${u.agirlik_hacim ? `<span class="card-unit">${u.agirlik_hacim}</span>` : ''}
        ${halBadge}
      </div>
      <div class="card-right">
        <div class="card-price">${cheapest ? tl(cheapest.fiyat) : '—'}</div>
        <div class="card-mkt-lbl">${cheapest ? (MARKET_NAMES[cheapest.market] || cheapest.market || '') : ''}</div>
        <button class="btn-ekle${inCart ? ' added' : ''}" data-pid="${u._id}"
          onclick="event.stopPropagation(); toggleSepet('${u._id}')">
          ${inCart ? '✓' : '+'}
        </button>
      </div>
    </div>
  </div>`;
}

// ── KATEGORİ GRİD ─────────────────────────────────────
function renderCatGrid() {
  document.getElementById('home-cats').innerHTML = KATEGORILER.map(k =>
    `<div class="cat-card" onclick="openCategory('${k.slug}')">
      <div class="cat-card-emoji">${k.emoji}</div>
      <div class="cat-card-name">${k.label}</div>
    </div>`
  ).join('');
}

// ── KATEGORİ EKRANI ───────────────────────────────────
async function openCategory(slug) {
  const kat = KATEGORILER.find(k => k.slug === slug);
  document.getElementById('cat-title').textContent = kat.label;
  document.getElementById('productList').innerHTML = skeletonHTML();
  document.getElementById('countNum').textContent = '…';
  currentKategori = slug;
  currentSayfa = 1;
  toplamSayfa = 1;
  urunler = [];
  activeMarket = null;
  document.querySelectorAll('.filter-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.market === 'all')
  );
  showScreen('screen-cat');
  document.getElementById('screen-cat').scrollTop = 0;
  await loadKategoriSayfasi(slug, 1);
}

function setMarketFilter(market) {
  activeMarket = market;
  document.querySelectorAll('.filter-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.market === (market || 'all'))
  );
  filterUrunler(activeMarket || 'tumu');
}

function filterUrunler(secilenMarket) {
  let visible = 0;
  document.querySelectorAll('#productList .card').forEach(card => {
    if (secilenMarket === 'tumu') {
      card.style.display = '';
      visible++;
    } else {
      const markets = card.dataset.markets || '';
      const show = markets.split(',').includes(secilenMarket);
      card.style.display = show ? '' : 'none';
      if (show) visible++;
    }
  });
  document.getElementById('countNum').textContent = visible;
}

async function loadKategoriSayfasi(slug, sayfa) {
  if (yukleniyor) return;
  yukleniyor = true;
  try {
    if (!catCache[slug]) await loadCat(slug);
    const all = catCache[slug] || [];
    const toplam = all.length;
    toplamSayfa = Math.max(1, Math.ceil(toplam / PAGE_SIZE));
    const start = (sayfa - 1) * PAGE_SIZE;
    const pageItems = all.slice(start, start + PAGE_SIZE);
    urunler = urunler.concat(pageItems);
    const list = document.getElementById('productList');
    if (sayfa === 1) {
      list.innerHTML = pageItems.length
        ? pageItems.map(cardHTML).join('')
        : `<div class="state-msg"><span class="icon">🔍</span>Ürün bulunamadı.</div>`;
    } else {
      list.insertAdjacentHTML('beforeend', pageItems.map(cardHTML).join(''));
    }
    filterUrunler(activeMarket || 'tumu');
  } catch(e) {
    console.error('Veri yükleme hatası:', e);
  } finally {
    yukleniyor = false;
  }
}

// ── SONSUZ SCROLL ─────────────────────────────────────
const scrollObserver = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && !yukleniyor && currentSayfa < toplamSayfa) {
    currentSayfa++;
    loadKategoriSayfasi(currentKategori, currentSayfa);
  }
}, { rootMargin: '300px' });
const _sentinel = document.getElementById('scroll-sentinel');
if (_sentinel) scrollObserver.observe(_sentinel);

// ── ARAMA ─────────────────────────────────────────────
let _searchTimer = null;
let _allLoaded = false;

async function loadAllCats() {
  if (_allLoaded) return;
  await Promise.all(KATEGORILER.map(k => loadCat(k.slug)));
  _allLoaded = true;
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim();
  document.getElementById('home-cats').style.display   = q ? 'none' : '';
  document.getElementById('home-search').style.display = q ? 'block' : 'none';
  if (!q) return;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(async () => {
    document.getElementById('searchList').innerHTML = skeletonHTML(3);
    await loadAllCats();
    const qn = norm(q);
    const allProducts = KATEGORILER.flatMap(k => catCache[k.slug] || []);
    const results = allProducts.filter(u => norm(u.ad).includes(qn)).slice(0, 96);
    document.getElementById('searchCount').textContent = results.length;
    document.getElementById('searchList').innerHTML = results.length
      ? results.map(cardHTML).join('')
      : `<div class="state-msg"><span class="icon">🔍</span>Sonuç bulunamadı.</div>`;
    results.forEach(u => { if (!urunler.find(x => x._id === u._id)) urunler.push(u); });
  }, 350);
});

// ── SEPET ─────────────────────────────────────────────
function saveSepet() {
  localStorage.setItem('pazar_sepet', JSON.stringify(sepet));
  const badge = document.getElementById('sepetCount');
  if (badge) badge.textContent = sepet.length;
}

function toggleSepet(id) {
  if (sepet.find(s => s._id === id)) {
    sepet = sepet.filter(s => s._id !== id);
    saveSepet();
    setEkleBtns(id, false);
  } else {
    const u = productMap[id] || urunler.find(u => u._id === id);
    if (!u) return;
    sepet.push({
      _id: u._id, ad: u.ad, resim: u.resim,
      agirlik_hacim: u.agirlik_hacim, ana_kategori: u.ana_kategori,
      market_fiyatlari: u.market_fiyatlari
    });
    saveSepet();
    setEkleBtns(id, true);
  }
}

function setEkleBtns(id, inCart) {
  document.querySelectorAll(`.btn-ekle[data-pid="${id}"]`).forEach(btn => {
    btn.className = 'btn-ekle' + (inCart ? ' added' : '');
    btn.textContent = inCart ? '✓' : '+';
  });
}

function removeFromSepet(id) {
  sepet = sepet.filter(s => s._id !== id);
  saveSepet();
  setEkleBtns(id, false);
  renderSepet();
}

function renderSepet() {
  document.getElementById('sepetCount').textContent = sepet.length;
  const el = document.getElementById('sepetContent');
  if (!sepet.length) {
    el.innerHTML = `<div class="state-msg"><span class="icon">🛒</span>Sepetiniz boş.<br>Ürün kartlarındaki + butonuna basın.</div>`;
    return;
  }
  const items = sepet.map(u => {
    const emoji = KAT_EMOJI[ustKategori(u.ana_kategori)] || '📦';
    const img   = u.resim
      ? `<img src="${u.resim}" alt="" loading="lazy" onerror="this.outerHTML='${emoji}'">`
      : emoji;
    const mktF = (u.market_fiyatlari || []).filter(f => f.fiyat != null).sort((a,b) => a.fiyat - b.fiyat)[0];
    const fiyatStr = mktF
      ? `<div style="text-align:right;color:#0F5132;font-size:.82rem;font-weight:700;flex-shrink:0;margin-right:6px;line-height:1.4">
           ${tl(mktF.fiyat)}<br><span style="font-size:.65rem;font-weight:500">${MARKET_NAMES[mktF.market]||mktF.market||'?'}</span>
         </div>` : '';
    return `<div class="cart-item" onclick="openDetay('${u._id}')" style="cursor:pointer">
      <div class="cart-item-img">${img}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${u.ad}</div>
        ${u.agirlik_hacim ? `<div class="cart-item-sub">${u.agirlik_hacim}</div>` : ''}
      </div>
      ${fiyatStr}
      <button class="cart-del" onclick="event.stopPropagation(); removeFromSepet('${u._id}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="cart-list">${items}</div>
    <button class="btn-compare" onclick="karsilastir()">Marketleri Karşılaştır →</button>
    <div id="compareOut"></div>`;
}

// ── KARŞILAŞTIRMA ─────────────────────────────────────
function _combos(arr, k) {
  if (k === 0) return [[]];
  if (arr.length < k) return [];
  const [h, ...t] = arr;
  return [..._combos(t, k - 1).map(c => [h, ...c]), ..._combos(t, k)];
}

function karsilastir() {
  if (!sepet.length) {
    document.getElementById('compareOut').innerHTML = `<div class="state-msg">Sepetiniz boş.</div>`;
    return;
  }
  const mkts = {};
  for (const item of sepet) {
    for (const f of (item.market_fiyatlari || []).filter(f => f.fiyat != null)) {
      const k = f.market || 'diger';
      if (!mkts[k]) mkts[k] = { name: MARKET_NAMES[k] || k, items: {} };
      if (!(item._id in mkts[k].items) || f.fiyat < mkts[k].items[item._id])
        mkts[k].items[item._id] = f.fiyat;
    }
  }
  const allKeys = Object.keys(mkts);

  function evalCombo(keys) {
    let total = 0; const assignment = {};
    for (const item of sepet) {
      let best = null;
      for (const k of keys) {
        if (item._id in mkts[k].items) {
          const p = mkts[k].items[item._id];
          if (!best || p < best.price) best = { key: k, name: mkts[k].name, price: p };
        }
      }
      if (!best) return null;
      total += best.price; assignment[item._id] = best;
    }
    return { total, assignment };
  }

  function bestN(n) {
    if (n > allKeys.length) return null;
    let best = null;
    for (const combo of _combos(allKeys, n)) {
      const r = evalCombo(combo);
      if (r && (!best || r.total < best.total)) best = r;
    }
    return best;
  }

  const opts = [bestN(1), bestN(2), bestN(3)];
  const base = opts[0] ? opts[0].total : null;
  window._cmpState = { opts, mkts };

  function mktNames(opt) {
    return [...new Set(Object.values(opt.assignment).map(a => a.name))].join(', ');
  }

  const labels = ['1 marketten al', '2 marketten al', '3 marketten al'];
  const cards = opts.map((opt, i) => {
    if (!opt) return `<div class="cmp-opt unavail"><div>
      <div class="cmp-opt-title">${labels[i]}</div>
      <div class="cmp-opt-sub">Yeterli market verisi yok</div></div></div>`;
    const save = base != null && i > 0 && opt.total < base ? base - opt.total : null;
    return `<div class="cmp-opt" onclick="showKombo(${i})">
      <div>
        <div class="cmp-opt-title">${labels[i]}</div>
        <div class="cmp-opt-sub">${mktNames(opt)}</div>
      </div>
      <div class="cmp-opt-right">
        <div class="cmp-opt-price">${tl(opt.total)}</div>
        <div class="cmp-opt-save">${save != null ? '💰 ' + tl(save) + ' tasarruf' : '&nbsp;'}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('compareOut').innerHTML = `
    <div class="compare-wrap">
      <div class="cmp-sec-label">Kaç Markete Gitmeye Değer?</div>
      <div class="cmp-opt-cards">${cards}</div>
      <div id="cmpDetail" class="cmp-detail"></div>
    </div>`;
}

function showKombo(idx) {
  const { opts, mkts } = window._cmpState || {};
  if (!opts) return;
  const opt = opts[idx];
  if (!opt) return;
  document.querySelectorAll('.cmp-opt').forEach((el, i) => el.classList.toggle('selected', i === idx));

  const MFROM = {
    a101:"A101'den", bim:"BİM'den", carrefour:"CarrefourSA'dan",
    migros:"Migros'tan", sok:"ŞOK'tan", tarim_kredi:"T.Kredi'den"
  };
  const groups = {};
  for (const item of sepet) {
    const a = opt.assignment[item._id];
    if (!a) continue;
    if (!groups[a.key]) groups[a.key] = { from: MFROM[a.key] || a.name + "'den", items: [], total: 0 };
    groups[a.key].items.push({ ad: item.ad + (item.agirlik_hacim ? ' ' + item.agirlik_hacim : ''), fiyat: a.price });
    groups[a.key].total += a.price;
  }

  const base = opts[0] ? opts[0].total : null;
  const save = base != null && idx > 0 && opt.total < base ? base - opt.total : null;

  const blocks = Object.values(groups).map(g => `
    <div class="cmp-mkt-block">
      <div class="cmp-mkt-name">🛒 ${g.from} alacakların:</div>
      ${g.items.map(it => `<div class="cmp-mkt-item">
        <span class="cmp-mkt-item-name">${it.ad}</span>
        <span class="cmp-mkt-item-price">${tl(it.fiyat)}</span>
      </div>`).join('')}
      <div class="cmp-mkt-subtotal">Toplam: ${tl(g.total)}</div>
    </div>`).join('');

  document.getElementById('cmpDetail').innerHTML =
    blocks +
    `<div class="cmp-grand"><span>Genel Toplam</span><span>${tl(opt.total)}</span></div>` +
    (save != null ? `<div class="cmp-grand cmp-grand-save"><span>💰 Tasarruf</span><span>${tl(save)}</span></div>` : '');
}

// ── VERİ YÜKLE (sadece hal.json — ürünler lazy) ───────
function loadData() {
  return fetch('./data/hal.json').then(r => r.json()).then(halData => {
    if (halData.urunler) {
      halMap = {};
      for (const u of halData.urunler) {
        const k = norm(u.ad);
        if (!halMap[k] || (u.fiyat != null && u.fiyat < (halMap[k].fiyat ?? 9999))) halMap[k] = u;
      }
      const bt = halData.bulten_tarihi || '';
      if (bt) document.getElementById('halDate').innerHTML =
        `<span class="hal-badge">Hal: ${bt.slice(0, 10)}</span>`;
    }
    renderCatGrid();
    saveSepet();
  }).catch(() => { renderCatGrid(); saveSepet(); });
}

loadData();

// ── BADGE INIT ────────────────────────────────────────
window.addEventListener('load', function() {
  sepet = JSON.parse(localStorage.getItem('pazar_sepet') || '[]');
  saveSepet();
});

// ── SERVICE WORKER ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
  let _swUpdateTimer = null;
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data?.type !== 'DATA_UPDATED') return;
    clearTimeout(_swUpdateTimer);
    _swUpdateTimer = setTimeout(() => loadData(), 300);
  });
}
</script>
